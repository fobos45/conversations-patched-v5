name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Загрузка исходного кода
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настройка JDK 21 (необходимо для текущей версии проекта)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. Права на выполнение Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Сборка именно Free версии (отключает зависимость от Google Services)
      - name: Build Free APK
        run: ./gradlew assembleConversationsFreeDebug

      # 5. Загрузка готового APK файла
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-free-debug
          # Путь для версии Free обычно выглядит так:
          path: app/build/outputs/apk/conversationsFree/debug/app-conversations-free-debug.apk
