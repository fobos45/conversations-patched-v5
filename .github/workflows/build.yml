name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      
      # Пробуем собрать проект целиком
      - name: Build
        run: ./gradlew assembleDebug

      # ВАЖНО: Эта команда выведет в лог путь к любому найденному APK
      - name: Locate all APKs
        run: find . -name "*.apk"
