name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      
      # Собираем версию Free
      - name: Build Free APK
        run: ./gradlew assembleConversationsFreeDebug

      # ВАЖНО: Выводим полный список всех файлов в папке сборки
      - name: Debug - List all files
        run: find . -maxdepth 5 -name "*.apk"

      # Загружаем всё, что нашлось в текущей директории
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: all-apks
          path: .
          # Используем include-hidden-files, чтобы точно ничего не упустить
          include-hidden-files: true
