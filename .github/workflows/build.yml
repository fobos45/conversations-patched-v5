name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. Сборка версии Free
      # Используем команду, которая не требует Google Play Services
      - name: Build Free APK
        run: ./gradlew assembleConversationsFreeDebug

      # 2. Поиск файла (выведет путь в консоль GitHub Actions)
      - name: Locate APK files
        run: find . -name "*.apk"

      # 3. Загрузка всех найденных APK
      # В версии v4 можно указать путь к папке, и он загрузит все файлы внутри
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-free-debug
          path: app/build/outputs/apk/
