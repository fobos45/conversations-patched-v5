name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Собираем версию Free
      - name: Build Free APK
        run: ./gradlew assembleConversationsFreeDebug

      # Отладочный шаг: выводит список всех файлов APK, чтобы мы точно знали их путь
      - name: Locate APK files
        run: find . -name "*.apk"

      # Загружаем всё, что нашлось в папке сборки
      # В версии v4 мы можем указывать путь к папке, и он заберет всё содержимое
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-free-debug
          path: app/build/outputs/apk/
